<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Touch Fix</title>

<style>
body{
  margin:0;
  background:#111;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:white;
}

canvas{
  background:#000;
  border:3px solid #00ff00;
  border-radius:10px;
  touch-action:none; /* 🔥 IMPORTANT FIX */
}

button{
  padding:8px 15px;
  margin-bottom:10px;
  background:#00ff00;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<button onclick="startGame()">Start Game</button>
<div id="score">Score: 0</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 400;

let snake, food, dir, score, gameLoop;
let box = 20;

function startGame(){
  snake = [{x:200,y:200}];
  dir = "RIGHT";
  score = 0;
  spawnFood();

  clearInterval(gameLoop);
  gameLoop = setInterval(update, 200);
}

function spawnFood(){
  food = {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
  };
}

function update(){
  let head = {...snake[0]};

  if(dir=="LEFT") head.x -= box;
  if(dir=="RIGHT") head.x += box;
  if(dir=="UP") head.y -= box;
  if(dir=="DOWN") head.y += box;

  snake.unshift(head);

  if(head.x==food.x && head.y==food.y){
    score++;
    spawnFood();
  }else{
    snake.pop();
  }

  if(head.x<0 || head.y<0 || head.x>=400 || head.y>=400){
    startGame();
    return;
  }

  for(let i=1;i<snake.length;i++){
    if(head.x==snake[i].x && head.y==snake[i].y){
      startGame();
      return;
    }
  }

  draw();
  document.getElementById("score").innerText = "Score: " + score;
}

function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,400,400);

  ctx.fillStyle="lime";
  snake.forEach(s=>{
    ctx.fillRect(s.x,s.y,box,box);
  });

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);
}

/* 🔥 PERFECT TOUCH FIX (canvas only + swipe) */
let startX, startY;

canvas.addEventListener("touchstart", e=>{
  let t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
}, {passive:false});

canvas.addEventListener("touchend", e=>{
  let t = e.changedTouches[0];
  let dx = t.clientX - startX;
  let dy = t.clientY - startY;

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx > 0 && dir!="LEFT") dir="RIGHT";
    else if(dx < 0 && dir!="RIGHT") dir="LEFT";
  }else{
    if(dy > 0 && dir!="UP") dir="DOWN";
    else if(dy < 0 && dir!="DOWN") dir="UP";
  }
});
</script>

</body>
</html>
