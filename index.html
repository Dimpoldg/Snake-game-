<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Touch Snake Game</title>

<style>
body{
  margin:0;
  text-align:center;
  background:#0f2027;
  color:white;
  font-family:Arial;
}

canvas{
  display:block;
  margin:auto;
  background:#111;
  border-radius:15px;
  touch-action:none;
}
</style>
</head>

<body>

<h2 id="score">Score: 0</h2>
<button onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, food, dir, gameInterval;
let score = 0;

function startGame(){
  snake = [{x:200,y:200}];
  dir = "RIGHT";
  score = 0;
  spawnFood();

  clearInterval(gameInterval);
  gameInterval = setInterval(gameLoop, 120);
}

function spawnFood(){
  food = {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

function gameLoop(){
  moveSnake();
  if(checkCollision()){
    alert("Game Over! Score: " + score);
    clearInterval(gameInterval);
    return;
  }
  drawGame();
}

function moveSnake(){
  let head = {...snake[0]};

  if(dir==="LEFT") head.x -=20;
  if(dir==="RIGHT") head.x +=20;
  if(dir==="UP") head.y -=20;
  if(dir==="DOWN") head.y +=20;

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    spawnFood();
  }else{
    snake.pop();
  }

  document.getElementById("score").innerText = "Score: " + score;
}

function checkCollision(){
  let head = snake[0];

  if(head.x<0 || head.y<0 || head.x>=400 || head.y>=400){
    return true;
  }

  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      return true;
    }
  }

  return false;
}

function drawGame(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,400,400);

  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle = "lime";
    ctx.beginPath();
    ctx.arc(s.x+10,s.y+10,10,0,Math.PI*2);
    ctx.fill();
  });

  // food
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(food.x+10,food.y+10,8,0,Math.PI*2);
  ctx.fill();
}

// 🔥 TOUCH CONTROL
canvas.addEventListener("touchstart", function(e){
  let touch = e.touches[0];
  let rect = canvas.getBoundingClientRect();

  let touchX = touch.clientX - rect.left;
  let touchY = touch.clientY - rect.top;

  let head = snake[0];

  // decide direction based on touch position
  let dx = touchX - (head.x+10);
  let dy = touchY - (head.y+10);

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx > 0 && dir!=="LEFT") dir="RIGHT";
    else if(dx < 0 && dir!=="RIGHT") dir="LEFT";
  }else{
    if(dy > 0 && dir!=="UP") dir="DOWN";
    else if(dy < 0 && dir!=="DOWN") dir="UP";
  }
});
</script>

</body>
</html>
