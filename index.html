<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Snake Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
}

canvas{
  display:block;
  margin:auto;
  background:#111;
  border-radius:15px;
  box-shadow:0 0 20px #0f0;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
}
</style>
</head>

<body>

<h1>🐍 Real Snake Game</h1>
<h2 id="score">Score: 0</h2>

<button onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, food, dir, gameInterval;
let score = 0;

function startGame(){
  snake = [{x:200,y:200}];
  dir = "RIGHT";
  score = 0;
  spawnFood();

  clearInterval(gameInterval);
  gameInterval = setInterval(gameLoop, 120);
}

function spawnFood(){
  food = {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

function gameLoop(){
  moveSnake();
  if(checkCollision()){
    alert("Game Over! Score: " + score);
    clearInterval(gameInterval);
    return;
  }
  drawGame();
}

function moveSnake(){
  let head = {...snake[0]};

  if(dir==="LEFT") head.x -=20;
  if(dir==="RIGHT") head.x +=20;
  if(dir==="UP") head.y -=20;
  if(dir==="DOWN") head.y +=20;

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    spawnFood();
  }else{
    snake.pop();
  }

  document.getElementById("score").innerText = "Score: " + score;
}

function checkCollision(){
  let head = snake[0];

  if(head.x<0 || head.y<0 || head.x>=400 || head.y>=400){
    return true;
  }

  for(let i=1;i<snake.length;i++){
    if(head.x===snake[i].x && head.y===snake[i].y){
      return true;
    }
  }

  return false;
}

function drawGame(){
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,400,400);

  // DRAW SNAKE (REAL LOOK)
  snake.forEach((s,i)=>{
    let gradient = ctx.createRadialGradient(s.x+10,s.y+10,2,s.x+10,s.y+10,10);
    gradient.addColorStop(0,"#66ff66");
    gradient.addColorStop(1,"#006600");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(s.x+10,s.y+10,10,0,Math.PI*2);
    ctx.fill();
  });

  // HEAD EYES
  let head = snake[0];
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(head.x+6,head.y+6,2,0,Math.PI*2);
  ctx.arc(head.x+14,head.y+6,2,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(head.x+6,head.y+6,1,0,Math.PI*2);
  ctx.arc(head.x+14,head.y+6,1,0,Math.PI*2);
  ctx.fill();

  // FOOD
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(food.x+10,food.y+10,8,0,Math.PI*2);
  ctx.fill();
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft" && dir!=="RIGHT") dir="LEFT";
  if(e.key==="ArrowRight" && dir!=="LEFT") dir="RIGHT";
  if(e.key==="ArrowUp" && dir!=="DOWN") dir="UP";
  if(e.key==="ArrowDown" && dir!=="UP") dir="DOWN";
});
</script>

</body>
</html>
